version: "3.9"

services:
  db:
    image: postgres:15
    container_name: math-db
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: kochina_10
      POSTGRES_DB: mathsolver

    ports:
      - "5432:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: math-backend
    restart: always

    depends_on:
      db:
        condition: service_healthy

    environment:
      DATABASE_URL: ${DATABASE_URL}
      HF_API_KEY: ${HF_API_KEY}

    ports:
      - "8000:8000"

    volumes:
      - ./backend:/app/backend

volumes:
  pgdata:
